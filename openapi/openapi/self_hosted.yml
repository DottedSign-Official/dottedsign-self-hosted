openapi: 3.0.3
info:
  title: DottedSign Self-Hosted API
  description: |
    DottedSign e-sign Self-Hosted API documentation.

    ## Authentication
    Most endpoints require a Bearer token obtained via OAuth login.
    Include `Authorization: Bearer {access_token}` in the request header.
  version: "1.0.0"
  contact:
    name: Kdan Mobile

servers:
  - url: https://{host}
    description: DottedSign Self-Hosted Server
    variables:
      host:
        default: your-domain.com
        description: Your Self-Hosted server host

tags:
  - name: OAuth
    description: OAuth authentication endpoints
  - name: Members - Auth
    description: Member registration and authentication
  - name: Members - Info
    description: Member profile and settings
  - name: Groups
    description: Group management
  - name: Sign Tasks
    description: Sign task lifecycle management
  - name: Sign Tasks - Sign Flow
    description: Signing process endpoints
  - name: Sign Tasks - Admin
    description: Administrative sign task operations
  - name: Sign Tasks - Bulk
    description: Bulk sign task operations
  - name: Sign Tasks - Audit
    description: Audit trail endpoints for sign tasks
  - name: Templates
    description: Template management
  - name: Files
    description: File upload and download
  - name: Signatures
    description: Signature management
  - name: Tags
    description: Tag management
  - name: General
    description: General system endpoints
  - name: Shorten Link
    description: URL shortener
  - name: Developer
    description: Developer API (admin-level access)
  - name: Internal
    description: Internal API (service-to-service)
  - name: Envelopes
    description: Envelope task management (bundle of multiple sign tasks)
  - name: Sign Tasks - Kiosk
    description: Kiosk sign task workflow (on-site signing without email invitation)
  - name: Envelope Settings
    description: Envelope-level signing settings configuration
  - name: Combinations
    description: Reusable sign stage combination templates
  - name: System CAs
    description: System CA (Certificate Authority) certificate management
  - name: Public Forms
    description: Public form sign task workflow (anonymous/multi-signer forms)

