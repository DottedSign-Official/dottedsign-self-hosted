/api/v1/sign_tasks/read:
  get:
    tags: [Sign Tasks]
    summary: Read Sign Task (for Signing)
    description: |
      Read sign task info for a signer. This is the primary endpoint used before signing.

      Workflow:
      1. Check if the member is involved in the task.
      2. Check if identity verification is required.
      3. Use the `download_link` in the response to download the PDF for rendering sign fields.
    security:
      - BearerAuth: []
    parameters:
      - name: sign_task_id
        in: query
        schema:
          type: integer
        description: Sign Task ID.
      - name: envelope_id
        in: query
        schema:
          type: integer
        description: Envelope ID.
      - name: ip_address
        in: query
        required: true
        schema:
          type: string
      - name: client
        in: query
        required: true
        schema:
          type: string
          enum: [web, app]
      - name: work_id
        in: query
        schema:
          type: string
      - name: code
        in: query
        schema:
          type: string
        description: Required for non-registered members.
      - name: verify_info[uuid]
        in: query
        schema:
          type: string
        description: UUID returned from the OTP-trigger response.
      - name: verify_info[verify_data]
        in: query
        schema:
          type: string
        description: OTP code received by the user.
      - name: verify_info[identity_verify_token]
        in: query
        schema:
          type: string
        description: Pre-issued identity verification token (certificate-based flow).
    responses:
      '200':
        description: Task read info retrieved.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                - type: object
                  properties:
                    download_link:
                      type: string
                      description: URL to download the original PDF for rendering sign fields.
                    complete_link:
                      type: string
                      nullable: true
                      description: URL to download the completed (signed) PDF. Present only when the task is completed.
                    reference_links:
                      type: array
                      nullable: true
                      description: Download URLs for reference documents attached to this task (visible during signing).
                      items:
                        type: string
                    completed_reference_links:
                      type: array
                      nullable: true
                      description: Download URLs for reference documents visible after the task is completed.
                      items:
                        type: string
                    xfdf_ready:
                      type: boolean
                      description: True when the PDF has been processed and sign fields are ready to render. Poll this before starting.
                    viewable_attachments:
                      type: array
                      nullable: true
                      description: List of attachment objects the current signer is allowed to view at this stage.
                      items:
                        type: object
                        properties:
                          task_id:
                            type: integer
                            description: ID of the sign task that owns this attachment.
                          actor_name:
                            type: string
                            description: Display name of the signer who uploaded the attachment.
                          file_name:
                            type: string
                            nullable: true
                            description: Original file name configured in the attachment setting.
                          file_id:
                            type: integer
                            description: ID of the underlying service file.
                          attachment_id:
                            type: string
                            description: Attachment setting identifier (matches `attachment_setting[].attachment_id`).
                          reviewable:
                            type: boolean
                            description: Present only when the current stage is a review action; indicates whether this attachment can be reviewed in the current stage.
                    review_info:
                      type: object
                      nullable: true
                      description: >
                        Review log info for the current stage. Present when the signer is in a review stage or reviewing a previously reviewed stage. Contains `reviewed_at`, `reviewed_by`, `reviewed_message`, `reviewed_fields`, and `reviewed_attachments`.

                    current_available_actions:
                      type: array
                      description: List of action names the current signer can perform at this point. Always includes `view`; `sign` / `review` / `confirm` are appended depending on the current stage state.
                      items:
                        type: string
                        enum: [view, sign, review, confirm]
                    identity_verify_token:
                      type: string
                      nullable: true
                      description: >
                        Present when identity verification is required before signing. Pass this token to `POST /trigger_verify` to initiate the OTP flow.

      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              file_processing:
                $ref: '../components/examples/errors/sign_task_errors.yml#/FileProcessing'
              invalid_preview_code:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidPreviewCode'
              request_too_frequently:
                $ref: '../components/examples/errors/sign_task_errors.yml#/RequestTooFrequently'
              member_already_secured:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAlreadySecured'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_accessible:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotAccessible'
              need_to_check_security:
                $ref: '../components/examples/errors/sign_task_errors.yml#/NeedToCheckSecurity'
              code_expire:
                $ref: '../components/examples/errors/sign_task_errors.yml#/CodeExpire'
              task_was_expired:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskWasExpired'
              task_was_declined:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskWasDeclined'
              task_is_draft:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskIsDraft'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotFound'
              stage_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/StageNotFound'

/api/v1/sign_tasks/start:
  post:
    tags: [Sign Tasks]
    summary: Start Draft Task
    description: Start a draft task to send signing invitations.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [client, ip_address]
            properties:
              sign_task_id:
                type: integer
                description: Sign task ID. Required if envelope_id is not provided.
              envelope_id:
                type: integer
                description: Envelope ID. Required if sign_task_id is not provided.
              client:
                type: string
                enum: [web, app]
              ip_address:
                type: string
    responses:
      '200':
        description: Task started.
        content:
          application/json:
            schema:
              type: object
              properties:
                category_for_owner_after_start:
                  type: string
                  enum: [waiting_for_me, waiting_for_other]
                  nullable: true
                  description: The task category the owner will see after starting. Null for sign_and_send tasks.
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_is_not_draft:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskIsNotDraft'
              file_processing:
                $ref: '../components/examples/errors/sign_task_errors.yml#/FileProcessing'
              signer_info_not_ready:
                $ref: '../components/examples/errors/sign_task_errors.yml#/SignerInfoNotReady'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_owned:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotOwned'
              over_monthly_task_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverMonthlyTaskUsage'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotFound'
/api/v1/sign_tasks/create_with_file:
  post:
    tags: [Sign Tasks]
    summary: Create Sign Task with File
    description: |
      Create a sign task and upload the PDF in **a single JSON request**, then auto-start it.
      No separate upload step or `POST /api/v1/sign_tasks/start` call is required.

      ### Request format
      - **Content-Type**: `application/json`
      - **`file`**: Base64-encoded PDF string (the raw bytes encoded with `Base64.decode64`-compatible
        encoding). Do **not** include the `data:application/pdf;base64,` prefix. This is **not**
        a `multipart/form-data` upload.

      ### Server-side pipeline
      After decoding the PDF, the server runs:
      1. `create_task` — creates the task record from `stages` / `setting` / `client` params.
      2. `generate_original_file` — writes the decoded PDF as the original file.
      3. `make_thumbnail` — generates the cover thumbnail.
      4. `generate_full_file` — renders the full PDF with embedded sign field metadata.
      5. `export_xfdf_from_full_file` — exports XFDF for downstream signing.
      6. `task.start(client_params)` — auto-dispatches signing invitations.

      If the pipeline cannot move the task out of the draft state, the API returns
      `400040 file_not_ready`.

      ### Stages
      The `stages` structure is identical to `POST /api/v1/sign_tasks`. Unlike the draft
      flow, **`xfdf_info` and `pdf_object_info` are optional** — if omitted, the document
      has no pre-defined fields and signers place signatures themselves during signing.

      ### Response options
      - `with_sign_url: true` — the response includes direct sign URLs for each signer,
        usable for quick-sign / kiosk-style flows.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/requests.yml#/ClientRequestFields'
              - $ref: '../components/schemas/requests.yml#/TaskSettingRequestObject'
              - type: object
                required: [file, file_name, has_order, stages, client, ip_address]
                properties:
                  file:
                    type: string
                    format: byte
                    description: |
                      Base64-encoded PDF content. Decoded server-side via `Base64.decode64`
                      and stored as `application/pdf`. Do not include any data-URI prefix.
                  file_name:
                    type: string
                    description: Display file name for the task (e.g. `contract.pdf`).
                  has_order:
                    type: boolean
                    description: If true, signers sign in the order defined by `stages`.
                  with_sign_url:
                    type: boolean
                    default: false
                    description: If true, the response embeds a direct sign URL for each signer stage.
                  need_otp_verify:
                    type: boolean
                    description: |
                      If true, every stage that omits `verify` is auto-populated with
                      `[{ verify_type: 'signer_detect' }]`.
                  tags:
                    type: array
                    items:
                      type: string
                    description: Optional tags applied to the task by the current member.
                  stages:
                    type: array
                    description: |
                      Signer stage definitions. `xfdf_info` / `pdf_object_info` are optional
                      for this endpoint — omit them to let signers place their own fields.
                    items:
                      $ref: '../components/schemas/requests.yml#/SignStageRequestObject'
          examples:
            create_with_file_minimal:
              $ref: '../components/examples/requests/sign_task_requests.yml#/CreateWithFileMinimal'
            create_with_file_full:
              $ref: '../components/examples/requests/sign_task_requests.yml#/CreateWithFileFull'
    responses:
      '200':
        description: Task created and started. Response shape matches the standard sign task object; if `with_sign_url` is true, each stage contains a `sign_url` field.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              need_more_information:
                $ref: '../components/examples/errors/sign_task_errors.yml#/NeedMoreInformation'
              invalid_object_id:
