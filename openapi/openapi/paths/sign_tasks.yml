/api/v1/sign_tasks/sign_and_send:
  post:
    tags: [Sign Tasks]
    summary: Create Sign and Send Task
    description: |
      Create a sign-and-send task where the owner signs the document immediately.

      Workflow:
      1. Call this API to create the task record.
      2. Use the `upload_link` in the response to upload the PDF file.
      3. Wait for the `task_completed` socket event (or poll until complete).
      4. Call `GET /api/v1/sign_tasks/read` to render the completed task.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/requests.yml#/ClientRequestFields'
              - type: object
                required: [file_name, pdf_object_info, xfdf_info, sign_info]
                properties:
                  file_name:
                    type: string
                    description: Task file name.
                  pdf_object_info:
                    type: array
                    items:
                      type: string
                    description: Signer's pdf_object_id list. Generated UUID by client side.
                  xfdf_info:
                    type: array
                    items:
                      $ref: '../components/schemas/sign_task.yml#/FieldSettingObject'
                    description: Field setting objects.
                  sign_info:
                    type: array
                    items:
                      type: object
                      properties:
                        object_id:
                          type: string
                        type:
                          type: string
                          enum: [signature, guest_signature, checkbox, radio, textfield, datefield]
                        value:
                          oneOf:
                            - type: integer
                            - type: boolean
                            - type: string
                    description: Signature info objects.
                  attachment_setting:
                    type: array
                    items:
                      $ref: '../components/schemas/sign_task.yml#/SignStageAttachmentSettingObject'
    responses:
      '200':
        description: Sign and send task created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                - type: object
                  properties:
                    upload_link:
                      type: string
                      description: Use this URL to upload the PDF file.
                    attachment_upload_infos:
                      type: object
                      nullable: true
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              invalid_object_id:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidObjectId'
              field_content_invalid:
                $ref: '../components/examples/errors/sign_task_errors.yml#/FieldContentInvalid'
              invalid_file_type:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidFileType'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              over_monthly_task_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverMonthlyTaskUsage'
/api/v1/sign_tasks/create_from_multi_template:
  post:
    tags: [Sign Tasks]
    summary: Create Sign Task from Multiple Templates
    description: Create a sign task by combining multiple templates into one document.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/requests.yml#/ClientRequestFields'
              - $ref: '../components/schemas/requests.yml#/TaskSettingRequestObject'
              - type: object
                required: [file_name, has_order, stages]
                description: Either template_codes or template_ids must be provided.
                properties:
                  template_codes:
                    type: array
                    items:
                      type: string
                    description: Array of template codes to combine. Required if template_ids is not provided.
                  template_ids:
                    type: array
                    items:
                      type: integer
                    description: Array of template IDs to combine. Required if template_codes is not provided.
                  file_name:
                    type: string
                    description: Task file name.
                  has_order:
                    type: boolean
                    description: Whether signers sign in sequence.
                  file:
                    type: string
                    description: Base64-encoded PDF to override the base document.
                  with_sign_url:
                    type: boolean
                    description: If true, the response will include quick sign URLs.
                  stages:
                    type: array
                    items:
                      $ref: '../components/schemas/requests.yml#/SignStageRequestObject'
    responses:
      '200':
        description: Task created from multiple templates.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              template_deleted:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateDeleted'
              template_merge_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateMergeFailed'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              over_template_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverTemplateUsage'
              over_monthly_task_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverMonthlyTaskUsage'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              template_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateNotFound'
/api/v1/sign_tasks/change_signer_requisition:
  put:
    tags: [Sign Tasks]
    summary: Contact Task Owner (Change Signer Requisition)
    description: |-
      Allows a signer to send a message to the task owner.
      Known in the UI as "Contact Sender".
      Authorization header is optional if using a preview code.

      NOTE: routes.rb defines this as POST (`post 'change_signer_requisition'` under scope module: :change), not PUT. The documented HTTP method is incorrect and needs to be switched from PUT to POST.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                description: Task preview code. Required for non-registered members.
              sign_task_id:
                type: integer
                description: Sign task ID. Required if envelope_id is not provided.
              envelope_id:
                type: integer
                description: Envelope ID. Required if sign_task_id is not provided.
              message:
                type: string
                description: Message to send to the task owner.
              new_signer:
                description: Optional replacement signer details. If omitted, `message` is required.
                properties:
                  email:
                    format: email
                    type: string
                  name:
                    type: string
                type: object
    responses:
      '200':
        description: Message sent to task owner.
        content:
          application/json:
            schema:
              type: object
              properties:
                request_sent_to:
                  type: string
                  description: Task owner's display name.
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              invalid_preview_code:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidPreviewCode'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotFound'
