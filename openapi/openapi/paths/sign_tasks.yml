/api/v1/sign_tasks:
  get:
    tags: [Sign Tasks]
    summary: List Sign Tasks
    security:
      - BearerAuth: []
    parameters:
      - description: Task category filter.
        in: query
        name: category
        required: true
        schema:
          enum:
            - waiting_for_me
            - reissue_for_me
            - waiting_for_others
            - completed
            - canceled
            - draft
          type: string
      - description: Page number.
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      - description: Number of items per page.
        in: query
        name: per_page
        required: false
        schema:
          default: 10
          type: integer
    responses:
      '200':
        description: Task list retrieved.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yml#/PaginationMeta'
                - type: object
                  properties:
                    tasks:
                      type: array
                      items:
                        $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                    summary:
                      type: object
                      description: Task count per category for the current member.
                      properties:
                        waiting_for_me:
                          type: integer
                          description: Tasks waiting for me to act.
                        waiting_for_other:
                          type: integer
                          description: Tasks waiting for others to act.
                        completed:
                          type: integer
                          description: Completed tasks.
                        declined:
                          type: integer
                          description: Declined tasks.
                        expired:
                          type: integer
                          description: Expired tasks.
                        draft:
                          type: integer
                          description: Draft tasks.
                        deleted:
                          type: integer
                          description: Deleted tasks.
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              invalid_category:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidCategory'
              tasks_too_much:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TasksTooMuch'
              sort_type_not_allow:
                $ref: '../components/examples/errors/sign_task_errors.yml#/SortTypeNotAllow'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
              token_invalid:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TokenInvalid'
  post:
    tags: [Sign Tasks]
    summary: Create Sign Task (Draft)
    description: |-
      Create a draft or create_and_invite task.

      Workflow:
      1. Call this API to create the task record.
      2. Use the `upload_link` in the response to upload the PDF.
      3. Wait for `task_uploaded` socket event (or poll `GET /api/v1/sign_tasks/read` until status is `draft` and `xfdf_ready` is `true`).
      4. Call `POST /api/v1/sign_tasks/start` to send signing invitations.

      > ⚠️ **`pdf_object_info` is required and must not be empty.**
      > This field must contain all `field_object_id` UUIDs (generated by the client) that correspond to the fields defined in `stages[].xfdf_info`.
      > If `pdf_object_info` is missing or empty, the backend will store an empty list, causing signing to fail with `error_code 400091` (`invalid_object_id`) at the sign step.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/requests.yml#/CreateSignTaskRequest'
          examples:
            single_signer_minimal:
              $ref: '../components/examples/requests/sign_task_requests.yml#/SingleSignerMinimal'
            ordered_two_signers:
              $ref: '../components/examples/requests/sign_task_requests.yml#/OrderedTwoSigners'
            with_deadline_and_settings:
              $ref: '../components/examples/requests/sign_task_requests.yml#/WithDeadlineAndSettings'
    responses:
      '200':
        description: Task created.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                - type: object
                  properties:
                    upload_link:
                      type: string
                      description: Use this URL to upload the PDF file.
                    attachment_upload_infos:
                      type: object
                      nullable: true
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              need_more_information:
                $ref: '../components/examples/errors/sign_task_errors.yml#/NeedMoreInformation'
              invalid_object_id:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidObjectId'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              over_monthly_task_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverMonthlyTaskUsage'
/api/v1/sign_tasks/{sign_task_id}:
  get:
    tags: [Sign Tasks]
    summary: Get Sign Task Detail
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yml#/SignTaskIdPath'
      - name: envelope_id
        in: query
        schema:
          type: integer
        description: Envelope ID. If provided, returns the envelope's first task.
      - name: client
        in: query
        schema:
          type: string
          enum: [web, app]
        description: Source client type.
      - name: ip_address
        in: query
        schema:
          type: string
        description: Requester's IP address.
      - name: code
        in: query
        schema:
          type: string
        description: Task preview code for non-registered (quick sign) members.
    responses:
      '200':
        description: Task detail retrieved.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_accessible:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotAccessible'
              code_expire:
                $ref: '../components/examples/errors/sign_task_errors.yml#/CodeExpire'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotFound'
  put:
    tags: [Sign Tasks]
    summary: Update Sign Task
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yml#/SignTaskIdPath'
