/api/v1/sign_tasks/filter:
  get:
    tags: [Sign Tasks]
    summary: Filter Sign Tasks by Expiry Status
    description: Filter sign tasks within a category by expiry status (expire_soon or expired).
    security:
      - BearerAuth: []
    parameters:
      - description: Task category to filter within.
        in: query
        name: category
        required: true
        schema:
          enum:
            - waiting_for_me
            - reissue_for_me
            - waiting_for_others
            - completed
            - canceled
            - draft
          type: string
      - description: Expiry filter type.
        in: query
        name: filter
        required: true
        schema:
          enum:
            - expire_soon
            - expired
          type: string
      - description: Page number.
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      - description: Number of items per page.
        in: query
        name: per_page
        required: false
        schema:
          default: 10
          type: integer
    responses:
      '200':
        description: Filtered task list retrieved.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yml#/PaginationMeta'
                - type: object
                  properties:
                    tasks:
                      type: array
                      items:
                        $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                    summary:
                      type: object
                      description: Task count per category for the current member.
                      properties:
                        waiting_for_me:
                          type: integer
                          description: Tasks waiting for me to act.
                        waiting_for_other:
                          type: integer
                          description: Tasks waiting for others to act.
                        completed:
                          type: integer
                          description: Completed tasks.
                        declined:
                          type: integer
                          description: Declined tasks.
                        expired:
                          type: integer
                          description: Expired tasks.
                        draft:
                          type: integer
                          description: Draft tasks.
                        deleted:
                          type: integer
                          description: Deleted tasks.
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              invalid_category:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidCategory'
              filter_not_allow:
                $ref: '../components/examples/errors/sign_task_errors.yml#/FilterNotAllow'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
