/api/v1/sign_tasks/read_from_preview_share_link:
  get:
    tags: [Sign Tasks]
    summary: Read Sign Task from Preview Share Link
    operationId: read_from_preview_share_link
    description: |
      Read a sign task using a preview share link code. No authentication required.
      Use the `download_link` in the response to download the PDF for rendering.
    parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
        description: Preview share link code (JWT).
      - name: sign_task_id
        in: query
        schema:
          type: integer
        description: Sign task ID.
      - name: envelope_id
        in: query
        schema:
          type: integer
        description: Envelope ID.
      - name: client
        in: query
        schema:
          type: string
          enum: [web, app]
      - name: ip_address
        in: query
        schema:
          type: string
    responses:
      '200':
        description: Task info retrieved from preview share link.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
                - type: object
                  properties:
                    download_link:
                      type: string
                      description: URL to download the PDF. Returns completed PDF if task is done, otherwise original PDF.
                    complete_link:
                      type: string
                      nullable: true
                      description: URL to download the completed PDF. Only present when task is completed.
                    attachment_link:
                      type: string
                      nullable: true
                      description: URL to download attachment. Only present when task is completed with attachment.
                    xfdf_ready:
                      type: boolean
                      description: True when the draft task is ready to start.
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              invalid_preview_code:
                $ref: '../components/examples/errors/sign_task_errors.yml#/InvalidPreviewCode'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              code_expire:
                $ref: '../components/examples/errors/sign_task_errors.yml#/CodeExpire'
              task_not_accessible:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotAccessible'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotFound'
