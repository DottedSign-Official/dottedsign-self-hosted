    tags: [Sign Tasks]
    summary: Change Signer
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            properties:
              envelope_id:
                description: Envelope ID. Required if sign_task_id is not provided.
                type: integer
              new_signer:
                properties:
                  email:
                    format: email
                    type: string
                  lang:
                    type: string
                  name:
                    type: string
                  phone:
                    type: string
                type: object
              reason:
                description: Reason message for changing the signer.
                type: string
              sign_task_id:
                description: Sign task ID. Required if envelope_id is not provided.
                type: integer
              stage_id:
                type: integer
            required:
              - stage_id
              - new_signer
            type: object
    responses:
      '200':
        description: Signer changed.
        content:
          application/json:
            schema:
              description: Returns the affected source ID keyed by source type.
              properties:
                envelope_id:
                  description: Present when the change was applied to an Envelope.
