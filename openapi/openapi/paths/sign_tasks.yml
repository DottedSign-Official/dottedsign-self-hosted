      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/requests.yml#/CreateSignTaskRequest'
    responses:
      '200':
        description: Task updated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_is_not_draft:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskIsNotDraft'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              task_not_owned:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TaskNotOwned'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
