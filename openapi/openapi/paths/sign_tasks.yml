/api/v1/sign_tasks/create_from_template:
  post:
    tags: [Sign Tasks]
    summary: Create Sign Task from Template
    description: |
      Create a sign task from a saved template. The task is automatically started after creation.

      **Identifying the template**: Provide either `template_id` (integer ID) or `template_code` (string code).
      At least one is required.

      **Role mapping**: Use `stages` to map template roles to actual signers.
      Each stage object must include `role` matching a role defined in the template,
      along with `email` and `name` for the assigned signer.

      **Override PDF**: Provide `file` (base64-encoded PDF string) to replace the template's base document.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/requests.yml#/ClientRequestFields'
              - $ref: '../components/schemas/requests.yml#/TaskSettingRequestObject'
              - type: object
                properties:
                  template_id:
                    type: integer
                    description: Template ID. Required if template_code is not provided.
                  template_code:
                    type: string
                    description: Template code. Required if template_id is not provided.
                  file_name:
                    type: string
                    description: Override the task file name. Defaults to the template's file name.
                  has_order:
                    type: boolean
                    description: Whether signers sign in sequence.
                  file:
                    type: string
                    description: Base64-encoded PDF to replace the template's base document.
                  with_sign_url:
                    type: boolean
                    description: If true, the response includes quick sign URLs for each signer.
                  stages:
                    type: array
                    description: Role mapping — assign real signers to template roles.
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                          description: Template role name to assign.
                        email:
                          type: string
                          description: Signer's email address.
                        name:
                          type: string
                          description: Signer's display name.
                        verify:
                          type: array
                          items:
                            $ref: '../components/schemas/requests.yml#/OtpVerifyRequestObject'
                        stage_setting:
                          $ref: '../components/schemas/sign_task.yml#/StageSettingObject'
    responses:
      '200':
        description: Task created from template.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/sign_task.yml#/SignTaskObject'
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              template_deleted:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateDeleted'
              not_match_stages_length:
                $ref: '../components/examples/errors/sign_task_errors.yml#/NotMatchStagesLength'
              template_with_invalid_stage_action:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateWithInvalidStageAction'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              over_template_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverTemplateUsage'
              template_not_accessible:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateNotAccessible'
              over_monthly_task_usage:
                $ref: '../components/examples/errors/sign_task_errors.yml#/OverMonthlyTaskUsage'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              template_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/TemplateNotFound'
              role_not_found:
                $ref: '../components/examples/errors/sign_task_errors.yml#/RoleNotFound'
