                  $ref: '../components/schemas/member.yml#/PermissionObject'
          examples:
            update_group_permissions:
              $ref: '../components/examples/requests/sign_task_admin_requests.yml#/UpdateGroupPermissions'
    responses:
      '200':
        description: Permissions updated.
        content:
          application/json:
            schema:
              properties:
                data:
                  items:
                    properties:
                      name:
                        type: string
                      permission:
                        additionalProperties:
                          type: boolean
                        type: object
                    type: object
                  type: array
