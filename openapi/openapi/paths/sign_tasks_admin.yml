/api/v1/sign_tasks/admin/member_report:
  post:
    tags: [Sign Tasks - Admin]
    summary: Get Group Member Tasks Report
    description: Get a task statistics report for group members within a time range.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [group_id, start_from, end_at]
            properties:
              group_id:
                type: integer
                description: Group ID.
              emails:
                type: array
                items:
                  type: string
                description: Filter by specific member emails.
              start_from:
                type: string
                description: Report start timestamp (Unix).
              end_at:
                type: string
                description: Report end timestamp (Unix).
    responses:
      '200':
        description: Member task report.
        content:
          application/json:
            schema:
              type: object
              properties:
                sent_summary:
                  type: array
                  items:
                    type: object
                    properties:
                      waiting:
                        type: integer
                        description: Waiting task count.
                      total:
                        type: integer
                        description: Total task count.
                      completed:
                        type: integer
                        description: Completed task count.
                      member:
                        $ref: '../components/schemas/member.yml#/MemberObject'
                complete_summary:
                  type: array
                  items:
                    type: object
                    properties:
                      completed:
                        type: integer
                        description: Completed task count.
                      member:
                        $ref: '../components/schemas/member.yml#/MemberObject'
                sent_time_avg_summary:
                  type: array
                  items:
                    type: object
                    properties:
                      spent_time_avg:
                        type: number
                        format: float
                        description: Average time to complete a task (seconds).
                      member:
                        $ref: '../components/schemas/member.yml#/MemberObject'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_not_group_admin:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberNotGroupAdmin'
