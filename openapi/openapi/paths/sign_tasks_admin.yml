      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_not_group_admin:
