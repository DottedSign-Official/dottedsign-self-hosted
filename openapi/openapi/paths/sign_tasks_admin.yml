/api/v1/sign_tasks/admin/tasks:
  get:
    tags: [Sign Tasks - Admin]
    summary: Admin List All Tasks
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: group_id
        required: true
        schema:
          type: integer
      - in: query
        name: category
        required: false
        schema:
          default: waiting_for_group
          type: string
      - in: query
        name: start_from
        required: false
        schema:
          description: Start date string (e.g. 2024-01-01)
          type: string
      - in: query
        name: end_at
        required: false
        schema:
          description: End date string (e.g. 2024-12-31)
          type: string
      - in: query
        name: emails
        required: false
        schema:
          items:
            type: string
          type: array
      - in: query
        name: sort_type
        required: false
        schema:
          type: string
      - in: query
        name: order_by
        required: false
        schema:
          type: string
      - in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
      - in: query
        name: per_page
        required: false
        schema:
          default: 10
          type: integer
    responses:
      '200':
        description: Admin task list.
        content:
          application/json:
            schema:
              properties:
                data:
                  properties:
                    current_page:
                      type: integer
                    summary:
                      additionalProperties:
                        type: integer
                      description: Task counts per category
                      type: object
                    tasks:
                      items:
                        $ref: ../components/schemas/sign_task.yml#/SignTaskObject
                      type: array
                    total_pages:
                      type: integer
                  type: object
              type: object
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              group_task_not_accessible:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/GroupTaskNotAccessible'
              member_not_group_admin:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberNotGroupAdmin'
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              group_not_found:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/GroupNotFound'
/api/v1/sign_tasks/admin/export:
  post:
    tags: [Sign Tasks - Admin]
    summary: Export Admin Task Report
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            properties:
              category:
                type: string
              emails:
                items:
                  type: string
                type: array
              end_at:
                description: End date string (e.g. 2024-12-31)
                type: string
              group_id:
                type: integer
              order_by:
                type: string
              sort_type:
                type: string
              start_from:
                description: Start date string (e.g. 2024-01-01)
                type: string
              zone:
                type: number
            required:
              - group_id
            type: object
    responses:
      '200':
        description: Export initiated.
        content:
          text/csv:
            schema:
              format: binary
              type: string
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_auth_failed:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberAuthFailed'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yml#/ErrorResponse'
            examples:
              member_not_group_admin:
                $ref: '../components/examples/errors/sign_task_admin_errors.yml#/MemberNotGroupAdmin'
/api/v1/sign_tasks/admin/permission:
