SignTaskIdPath:
  name: sign_task_id
  in: path
  required: true
  schema:
    type: integer
  description: Sign Task ID.

TemplateIdPath:
  name: id
  in: path
  required: true
  schema:
    type: integer
  description: Template ID.

GroupIdPath:
  name: group_id
  in: path
  required: true
  schema:
    type: integer
  description: Group ID.

PageQuery:
  name: page
  in: query
  schema:
    type: integer
    default: 1
  description: Page number.

PerPageQuery:
  name: per_page
  in: query
  schema:
    type: integer
    default: 10
  description: Number of items per page.
