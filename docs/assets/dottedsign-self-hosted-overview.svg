<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 340" width="820" height="340" xmlns="http://www.w3.org/2000/svg" font-family="'Sora','Noto Sans TC',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2846"/>
      <stop offset="1" stop-color="#2c3a6b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6ef0"/>
      <stop offset="1" stop-color="#4b5fe6"/>
    </linearGradient>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7d8be8"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="340" rx="16" fill="url(#bg)"/>
  <!-- soft pattern dots (brand) -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="780" cy="44" r="74"/>
    <circle cx="60" cy="300" r="58"/>
  </g>

  <!-- LEFT: your server / cloud -->
  <g>
    <text x="125" y="74" fill="#aeb8e8" font-size="13" font-weight="600" text-anchor="middle">Your Server / Cloud</text>
    <rect x="40" y="88" width="170" height="150" rx="14" fill="#ffffff" opacity="0.08"/>
    <rect x="40" y="88" width="170" height="150" rx="14" fill="none" stroke="#5b6ef0" stroke-opacity="0.5"/>
    <!-- server stack -->
    <rect x="84" y="108" width="82" height="22" rx="5" fill="#41c3e1" opacity="0.9"/>
    <rect x="84" y="136" width="82" height="22" rx="5" fill="#5b6ef0"/>
    <rect x="84" y="164" width="82" height="22" rx="5" fill="#5b6ef0" opacity="0.7"/>
    <circle cx="96" cy="119" r="3" fill="#1e2846"/>
    <circle cx="96" cy="147" r="3" fill="#fff"/>
    <circle cx="96" cy="175" r="3" fill="#fff"/>
    <!-- caption inside the frame, two lines to fit width -->
    <text x="125" y="210" fill="#8fa0d8" font-size="10" text-anchor="middle">AWS · GCP · Azure</text>
    <text x="125" y="226" fill="#8fa0d8" font-size="10" text-anchor="middle">Snowflake · self-hosted</text>
  </g>

  <!-- arrow 1 -->
  <path d="M224 163 H260" stroke="#7d8be8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- MIDDLE: docker compose stack -->
  <g>
    <text x="380" y="74" fill="#aeb8e8" font-size="13" font-weight="600" text-anchor="middle">docker compose up -d</text>
    <rect x="280" y="88" width="200" height="150" rx="14" fill="#ffffff" opacity="0.07"/>
    <rect x="280" y="88" width="200" height="150" rx="14" fill="none" stroke="#5b6ef0" stroke-opacity="0.5"/>
    <g font-size="11" fill="#1e2846" font-weight="600" text-anchor="middle">
      <rect x="298" y="102" width="76" height="26" rx="6" fill="#dfe4ff"/><text x="336" y="119">frontend</text>
      <rect x="386" y="102" width="76" height="26" rx="6" fill="#dfe4ff"/><text x="424" y="119">backend</text>
      <rect x="298" y="136" width="76" height="26" rx="6" fill="#cfe9f4"/><text x="336" y="153">worker</text>
      <rect x="386" y="136" width="76" height="26" rx="6" fill="#cfe9f4"/><text x="424" y="153">nginx</text>
      <rect x="298" y="170" width="76" height="26" rx="6" fill="#fde7b0"/><text x="336" y="187">Postgres</text>
      <rect x="386" y="170" width="76" height="26" rx="6" fill="#fde7b0"/><text x="424" y="187">Redis</text>
    </g>
    <text x="380" y="222" fill="#8fa0d8" font-size="10" text-anchor="middle">data stays inside your network</text>
  </g>

  <!-- arrow 2 -->
  <path d="M494 163 H530" stroke="#7d8be8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- RIGHT: signing flow -->
  <g>
    <text x="660" y="74" fill="#aeb8e8" font-size="13" font-weight="600" text-anchor="middle">eSignature workflow</text>
    <rect x="550" y="88" width="220" height="150" rx="14" fill="#ffffff" opacity="0.08"/>
    <rect x="550" y="88" width="220" height="150" rx="14" fill="none" stroke="#5b6ef0" stroke-opacity="0.5"/>
    <!-- document (left side of box) -->
    <rect x="582" y="112" width="70" height="84" rx="7" fill="#ffffff"/>
    <rect x="592" y="124" width="50" height="5" rx="2.5" fill="#c8cfe8"/>
    <rect x="592" y="136" width="42" height="5" rx="2.5" fill="#c8cfe8"/>
    <rect x="592" y="148" width="46" height="5" rx="2.5" fill="#c8cfe8"/>
    <path d="M592 176 q9 -11 18 0 t18 0" stroke="#4b5fe6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- check seal (right side, clear gap from document) -->
    <circle cx="710" cy="154" r="24" fill="url(#blue)"/>
    <path d="M699 154.5 l7 7 l15 -16" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- caption inside the frame -->
    <text x="660" y="224" fill="#8fa0d8" font-size="10" text-anchor="middle">send · track · sign · archive</text>
  </g>

  <!-- footer tag -->
  <text x="410" y="296" fill="#c3ccf0" font-size="12.5" font-weight="600" text-anchor="middle">DottedSign Self-Hosted — your data, your server, full eSignature workflow</text>
  <text x="410" y="318" fill="#7d8be8" font-size="10.5" text-anchor="middle">Trusted by 4,200+ businesses · 1M+ users worldwide</text>
</svg>
