          self_disable: Signer of %{doc_name} Has Been Changed
          other_disable: "%{sender_name} Has Changed the Signer of %{doc_name}"
        title: Signer Changed
        content_1:
          self_disable_html: You have handed over the signing privilege of <strong>"%{doc_name}"</strong> to %{new_receiver_name} (%{new_receiver_email}).
          other_disable_html: '%{sender_name} (%{sender_email}) has removed you from signing <strong>"%{doc_name}"</strong>.'
