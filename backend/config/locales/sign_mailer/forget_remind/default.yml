        content_1_html: '%{sender_name} hat Ihnen <strong>"%{doc_name}"</strong> vor %{pass_days} Tagen zur Unterschrift geschickt. Bitte klicken Sie auf die Schaltfläche um das Dokument zu unterschreiben.'
        content_2_html: "*Bitte beachten Sie, dass dieser Link in <strong>2 Tagen abläuft</strong>, wenn Sie nicht bei DottedSign on-premise registriert sind. Dies dient dazu, das Dokument vor unberechtigtem Zugriff zu schützen."
