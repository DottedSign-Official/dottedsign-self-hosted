---
en:
  sign_mailer:
    forget_remind:
      default:
        subject: Don't Forget to Sign %{doc_name} Requested by %{sender_name}
        title: '"%{doc_name}" is Waiting for You to Sign'
        content_1_html: '%{sender_name} has sent you <strong>"%{doc_name}"</strong> for signature %{pass_days} days ago. Please click on the button to sign the document.'
        content_2_html: "*Please note that if you are not registered to DottedSign on-premise, this link will expire in <strong>2 days</strong>. This is to prevent the task from unauthorized access."
        button: View & Sign
hant:
  sign_mailer:
    forget_remind:
      default:
        subject: "%{sender_name}邀請您簽署%{doc_name}"
        title: '"%{doc_name}"正在等待您的簽署'
        content_1_html: '%{sender_name}在%{pass_days}天前寄送了一則簽名邀請<strong>"%{doc_name}"</strong>給您，請點擊下方按鈕以查看並簽署文件。'
        content_2_html: 請注意：若您尚未註冊點點簽，為了保障簽署安全性，此連結將於<strong>2天</strong>內失效。
        button: 查看並簽署
hans:
  sign_mailer:
    forget_remind:
      default:
        subject: "%{sender_name}邀请您签名%{doc_name}"
        title: '"%{doc_name}"正在等待您的签名'
        content_1_html: '%{sender_name}在%{pass_days}天前寄送了一则签名邀请<strong>"%{doc_name}"</strong>给您，请点击下方按钮以查看并签署文件。'
        content_2_html: 请注意：若您尚未註册点点签，为了保障签署安全性，此连结将于<strong>2天</strong>内失效。
        button: 查看并签名
ja:
  sign_mailer:
    forget_remind:
      default:
        subject: 必ず%{sender_name}さんがリクエストした%{doc_name}を署名してください
        title: '"%{doc_name}"は他のメンバーが署名待ちです。'
        content_1_html: '%{sender_name}さんが%{pass_days}日前に署名用に<strong>"%{doc_name}"</strong>を送信しました。 このボタンをクリックしてドキュメントを署名してください。'
        content_2_html: ご注意：DottedSign on-premiseにご登録でない場合、このリンクは<strong>2日</strong>のみ有効です。 これはドキュメントへの不正アクセス防止の措置です。
        button: 閲覧＆署名
it:
