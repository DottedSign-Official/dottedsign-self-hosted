        title: '"%{doc_name}"는 서명하기를 기다리고 있습니다.'
        content_1_html: '%{sender_name} 는(은) %{pass_days}일 전에 서명을 위해 <strong>"%{doc_name}"</strong>을(를) 보냈습니다. 문서에 서명하려면 버튼을 클릭하십시오.'
        content_2_html: DottedSign on-premise에 등록하지 않은 경우, 이 링크는 <strong>2일</strong> 내에 만료됨을 참고하십시오. 이는 무단 접근으로부터 문서를 보호하기 위함입니다.
        button: 보기 및 서명
