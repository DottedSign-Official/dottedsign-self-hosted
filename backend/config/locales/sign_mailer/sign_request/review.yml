        title: 귀하의 검토를 기다리고 있습니다
        content_1_html: '%{sender_name} (%{sender_email})(은)는 <strong>"%{doc_name}"</strong>에서 %{signer_name}에 의해 완료된 서명한 내용을 확인하도록 요청했습니다.'
