        button: 閲覧＆チェック
it:
  sign_mailer:
    sign_request:
      review:
        subject:
          with_signer_name: "%{sender_name} ti ha chiesto di controllare %{doc_name}"
          without_signer_name: "È il tuo turno di controllare %{doc_name}"
        title: In attesa della tua revisione
