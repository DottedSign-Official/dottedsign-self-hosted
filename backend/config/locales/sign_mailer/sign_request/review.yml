en:
  sign_mailer:
    sign_request:
      review:
        subject:
          with_signer_name: "%{sender_name} Has Requested You to Review %{doc_name}"
          without_signer_name: It's Your Turn to Review %{doc_name}
        title: Waiting for You to Review
        content_1_html: '%{sender_name} (%{sender_email}) has requested your review the signed content completed by %{signer_name} in <strong>"%{doc_name}"</strong>.'
        content_2_html: "*Please note that if you are not registered to DottedSign, this link will expire in <strong>2 days</strong>. This is to prevent the task from unauthorized access."
        button: View & Review
hant:
  sign_mailer:
    sign_request:
      review:
        subject:
          with_signer_name: "%{sender_name} 邀請您檢查 %{doc_name}"
          without_signer_name: 您有新的檢查邀請：%{doc_name}
        title: 正在等待您的檢查
        content_1_html: '%{sender_name} (%{sender_email}) 邀請您檢查 %{signer_name} 於 <strong>"%{doc_name}"</strong> 填寫的內容。'
        content_2_html: 請注意：若您尚未註冊點點簽，為了保障簽署安全性，此連結將於<strong>2天</strong>內失效。
        button: 查看 & 檢查
hans:
  sign_mailer:
    sign_request:
      review:
        subject:
          with_signer_name: "%{sender_name} 邀请您检查 %{doc_name}"
          without_signer_name: 您有新的检查邀请：%{doc_name}
        title: 正在等待您的检查
