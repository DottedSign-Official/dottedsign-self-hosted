ja:
  sign_mailer:
    sign_request:
      review:
        subject:
          with_signer_name: "%{sender_name}から %{doc_name} の確認をリクエストしました。"
          without_signer_name: "%{doc_name} を確認するように招待されました"
        title: あなたの確認を待っています
        content_1_html: '%{sender_name} (%{sender_email})は%{signer_name} が<strong>"%{doc_name}"</strong>で署名した内容の確認をリクエストしました。'
