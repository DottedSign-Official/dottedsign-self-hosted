map $http_origin $cors {
  '~*^(http|https)?://.*.*$' 'true';
}

map $cors $allow_origin {
  'true' $http_origin;
}

map $cors $allow_methods {
  'true' 'GET, POST, PUT, PATCH, POST, DELETE, OPTIONS, HEAD';
}

server {
  listen 80 default_server;
  #  listen 443 ssl;
  server_name _;
  resolver 127.0.0.11 valid=1s ipv6=off;

  access_log  /var/log/nginx/jackrabbit_on_premise.access.log  main;
  error_log  /var/log/nginx/jackrabbit_on_premise.error.log;

  client_max_body_size 150m;
  client_body_buffer_size 50m;

  proxy_buffering on;
  proxy_buffer_size 512k;
  proxy_buffers 20 512k;
  proxy_busy_buffers_size 512k;

  add_header "X-Frame-Options" "SAMEORIGIN";
  add_header "X-Content-Type-Options" "nosniff" always;
  add_header "X-XSS-Protection" "1; mode=block";
  add_header "Referrer-Policy" "strict-origin-when-cross-origin";
  add_header "Permission-Policy" "autoplay=(self), geolocation=(self), midi=(), sync-xhr=(self), microphone, camera=(), gyroscope=(), fullscreen=(self), payment=(self)";
  add_header "Strict-Transport-Security" "max-age=3153600; includeSubDomains" "always";
  add_header "Cache-Control" "no-store";
  add_header "Access-Control-Allow-Origin" $allow_origin always;
  add_header "Access-Control-Allow-Methods" $allow_methods;
  add_header "Access-Control-Allow-Headers" "Authorization, Origin, X-Requested-With, Content-Type, Accept";
  add_header "Access-Control-Allow-Credentials" "true" always;

  if ($request_method = "OPTIONS") {
    return 204;
  }

  location /health {
    return 200;
  }

  location ~ /api(.*)\.(\S+)$ {
    return 404;
  }

  location / {
    # First attempt to serve request as file, then
    # as directory, then fall back to displaying a 404.
    # try_files $uri $uri/ =404;
    try_files $uri/index.html $uri.html $uri @dottedsign_on_premise_frontend;
    error_page 404              /404.html;
    error_page 422              /422.html;
    error_page 500 502 503 504  /500.html;
    error_page 403              /403.html;
  }

  location ~ /api {
    # First attempt to serve request as file, then
    # as directory, then fall back to displaying a 404.
    # try_files $uri $uri/ =404;
    try_files $uri/index.html $uri.html $uri @dottedsign_on_premise_backend;
    error_page 404              /404.html;
    error_page 422              /422.html;
    error_page 500 502 503 504  /500.html;
    error_page 403              /403.html;
  }

  location ~ /sidekiq {
    # First attempt to serve request as file, then
    # as directory, then fall back to displaying a 404.
    # try_files $uri $uri/ =404;
    try_files $uri/index.html $uri.html $uri @dottedsign_on_premise_backend;
    error_page 404              /404.html;
    error_page 422              /422.html;
    error_page 500 502 503 504  /500.html;
    error_page 403              /403.html;
  }

  location ~ /oauth {
    # First attempt to serve request as file, then
    # as directory, then fall back to displaying a 404.
    # try_files $uri $uri/ =404;
    try_files $uri/index.html $uri.html $uri @dottedsign_on_premise_backend;
    error_page 404              /404.html;
    error_page 422              /422.html;
    error_page 500 502 503 504  /500.html;
    error_page 403              /403.html;
  }

  location ~ /socket {
    try_files $uri  @dottedsign_on_premise_backend;
    error_page 404              /404.html;
    error_page 422              /422.html;
    error_page 500 502 503 504  /500.html;
    error_page 403              /403.html;
  }

  location @dottedsign_on_premise_frontend {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Ssl on;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_redirect off;
    proxy_next_upstream error;
    set $dottedsign_container "on_premise_frontend";
    proxy_pass http://$dottedsign_container:3000;
    proxy_connect_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
  }

  location @dottedsign_on_premise_backend {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Ssl on;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_redirect off;
    proxy_next_upstream error;
    set $dottedsign_container "on_premise_backend";
    proxy_pass http://$dottedsign_container:3000;
    proxy_connect_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_hide_header Server;
    # The Important Websocket Bits!
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
  }
}
